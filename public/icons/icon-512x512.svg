<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1f"/>
      <stop offset="100%" style="stop-color:#2a2a32"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- Taxi Car Icon -->
  <g transform="translate(56, 120)">
    <!-- Car Body -->
    <path d="M100 180 L100 100 L140 50 L260 50 L300 100 L300 180 Z" fill="url(#yellowGrad)" stroke="#eab308" stroke-width="4"/>
    <!-- Roof -->
    <path d="M140 50 L160 20 L240 20 L260 50" fill="#222228" stroke="url(#yellowGrad)" stroke-width="4"/>
    <!-- Taxi Sign -->
    <rect x="170" y="5" width="60" height="25" rx="4" fill="url(#yellowGrad)"/>
    <text x="200" y="22" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1f">TAXI</text>
    <!-- Windows -->
    <path d="M150 95 L170 55 L230 55 L250 95 Z" fill="#3a3a42"/>
    <!-- Wheels -->
    <circle cx="150" cy="200" r="35" fill="#222228" stroke="#3a3a42" stroke-width="6"/>
    <circle cx="150" cy="200" r="18" fill="#3a3a42"/>
    <circle cx="250" cy="200" r="35" fill="#222228" stroke="#3a3a42" stroke-width="6"/>
    <circle cx="250" cy="200" r="18" fill="#3a3a42"/>
    <!-- Headlights -->
    <rect x="290" y="110" width="20" height="30" rx="4" fill="#fff"/>
    <rect x="290" y="150" width="20" height="20" rx="4" fill="#ef4444"/>
  </g>
</svg>
